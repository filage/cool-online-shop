services:
  catalog-postgres:
    image: postgres:16-alpine
    container_name: catalog-postgres
    environment:
      POSTGRES_DB: ${CATALOG_DB_NAME}
      POSTGRES_USER: ${CATALOG_DB_USER}
      POSTGRES_PASSWORD: ${CATALOG_DB_PASSWORD}
    ports:
      - "${CATALOG_DB_PORT}:5432"
    volumes:
      - catalog_postgres_data:/var/lib/postgresql/data

  user-postgres:
    image: postgres:16-alpine
    container_name: user-postgres
    environment:
      POSTGRES_DB: ${USER_DB_NAME}
      POSTGRES_USER: ${USER_DB_USER}
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD}
    ports:
      - "${USER_DB_PORT}:5432"
    volumes:
      - user_postgres_data:/var/lib/postgresql/data

  order-postgres:
    image: postgres:16-alpine
    container_name: order-postgres
    environment:
      POSTGRES_DB: ${ORDER_DB_NAME}
      POSTGRES_USER: ${ORDER_DB_USER}
      POSTGRES_PASSWORD: ${ORDER_DB_PASSWORD}
    ports:
      - "${ORDER_DB_PORT}:5432"
    volumes:
      - order_postgres_data:/var/lib/postgresql/data

  cart-redis:
    image: redis:7-alpine
    container_name: cart-redis
    ports:
      - "${CART_REDIS_PORT}:6379"

volumes:
  catalog_postgres_data:
  user_postgres_data:
  order_postgres_data:
