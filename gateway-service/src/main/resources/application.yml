server:
  port: ${GATEWAY_SERVICE_PORT:8080}

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: ${GATEWAY_USER_SERVICE_URL}
              predicates:
                - Path=/api/users/**
              filters:
                - RewritePath=/api/users/?(?<segment>.*), /users/$\{segment}
            - id: catalog-service
              uri: ${GATEWAY_CATALOG_SERVICE_URL}
              predicates:
                - Path=/api/catalog/**
              filters:
                - RewritePath=/api/catalog/?(?<segment>.*), /$\{segment}
            - id: cart-service
              uri: ${GATEWAY_CART_SERVICE_URL}
              predicates:
                - Path=/api/cart/**
              filters:
                - RewritePath=/api/cart/?(?<segment>.*), /cart/$\{segment}
            - id: order-service
              uri: ${GATEWAY_ORDER_SERVICE_URL}
              predicates:
                - Path=/api/orders/**
              filters:
                - RewritePath=/api/orders/?(?<segment>.*), /orders/$\{segment}

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
