server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: user-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/users/**
        - id: catalog-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/catalog/**
        - id: cart-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/cart/**
        - id: order-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/orders/**
        - id: payment-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/payments/**

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
